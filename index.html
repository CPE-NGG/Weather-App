<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherWeather Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Space Mono for Terminal Feel -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-color: #050505; /* Midnight Blue / Deep Charcoal */
            --neon-color: #ffd700; /* Default: Gold (Clear/Dust) */
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        /* Theme Overrides applied via JS */
        body.theme-rain { --neon-color: #00ffff; } /* Cyan */
        body.theme-thunder { --neon-color: #b026ff; } /* Purple */
        body.theme-snow { --neon-color: #ffffff; } /* White */
        body.theme-clouds { --neon-color: #b0c4de; } /* Light Steel Blue / Silver */
        body.theme-autumn { --neon-color: #ff6a00; } /* Orange */
        body.theme-clear { --neon-color: #ffcc00; } /* Sunny Yellow */

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Space Mono', monospace;
            color: #ffffff;
            transition: all 1s ease;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Let clicks pass through to background if needed */
        }

        .interactive {
            pointer-events: auto;
        }

        /* Glassmorphism with Neon Accents */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .neon-border {
            border: 1px solid var(--neon-color);
            box-shadow: 0 0 15px rgba(var(--neon-color), 0.2), 
                        inset 0 0 10px rgba(var(--neon-color), 0.1);
        }

        .neon-text {
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-color);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-color); border-radius: 3px; }

        input:focus { outline: none; }
        
        /* Loading Spinner */
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="theme-clear">

    <!-- Three.js Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="p-6 md:p-12 justify-between">
        
        <!-- Top Bar: Search -->
        <div class="w-full max-w-md mx-auto interactive">
            <form id="search-form" class="glass-card neon-border flex items-center p-2 px-4 transition-all hover:bg-white/5">
                <i class="ph ph-magnifying-glass text-xl text-gray-400"></i>
                <input type="text" id="city-input" placeholder="Search any city in the world..." 
                       class="w-full bg-transparent border-none text-white px-3 py-2 placeholder-gray-500 font-mono text-sm">
                <button type="submit" class="text-sm font-bold neon-text hover:opacity-80 transition-opacity">
                    SCAN
                </button>
            </form>
            <div id="error-msg" class="mt-3 text-center hidden flex flex-col items-center">
                <span id="error-text" class="text-red-400 text-xs">City not found.</span>
                <button id="reset-key-btn" type="button" class="mt-2 text-[#ffd700] text-xs underline hover:text-white cursor-pointer hidden">Reset API Key</button>
            </div>
        </div>

        <!-- Main Weather Display -->
        <div class="flex-grow flex items-center justify-center interactive">
            <div id="weather-card" class="glass-card neon-border p-8 md:p-12 w-full max-w-lg transform transition-all duration-700 opacity-0 scale-95">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h1 id="ui-city" class="text-3xl md:text-5xl font-bold tracking-tighter mb-1">CITY</h1>
                        <p id="ui-country" class="text-gray-400 text-sm tracking-widest">COUNTRY</p>
                    </div>
                    <div id="ui-icon" class="text-5xl neon-text">
                        <i class="ph ph-cloud"></i>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="text-6xl md:text-8xl font-bold tracking-tighter flex items-start">
                        <span id="ui-temp">--</span>
                        <span class="text-3xl md:text-4xl text-gray-400 mt-2">°C</span>
                    </div>
                    <p id="ui-desc" class="text-lg uppercase tracking-widest neon-text mt-2">Awaiting Data</p>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div class="flex items-center space-x-3">
                        <i class="ph ph-wind text-2xl text-gray-400"></i>
                        <div>
                            <p class="text-xs text-gray-500 uppercase">Wind</p>
                            <p id="ui-wind" class="font-bold">-- m/s</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <i class="ph ph-drop text-2xl text-gray-400"></i>
                        <div>
                            <p class="text-xs text-gray-500 uppercase">Humidity</p>
                            <p id="ui-humidity" class="font-bold">-- %</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center text-xs text-gray-500 tracking-widest uppercase">
            AetherWeather <span class="mx-2">|</span> Procedural Environmental Dashboard
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        // ==========================================
        // 1. SYSTEM STATE & CONSTANTS
        // ==========================================
        const state = {
            weatherMain: 'Clear', // Default state
            windSpeed: 0,
            mouse: new THREE.Vector2(0, 0),
            targetSkyColor: new THREE.Color(0x0a1a3a),
            targetFogDensity: 0.015
        };

        const DOM = {
            searchForm: document.getElementById('search-form'),
            cityInput: document.getElementById('city-input'),
            errorMsg: document.getElementById('error-msg'),
            errorText: document.getElementById('error-text'),
            weatherCard: document.getElementById('weather-card'),
            uiCity: document.getElementById('ui-city'),
            uiCountry: document.getElementById('ui-country'),
            uiTemp: document.getElementById('ui-temp'),
            uiDesc: document.getElementById('ui-desc'),
            uiWind: document.getElementById('ui-wind'),
            uiHumidity: document.getElementById('ui-humidity'),
            uiIcon: document.getElementById('ui-icon')
        };

        // ==========================================
        // 2. 3D ENVIRONMENT (CLOUDS, RAIN, SKIES)
        // ==========================================
        let scene, camera, renderer, environmentSystem;
        let clock = new THREE.Clock();

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1a3a);
            scene.fog = new THREE.FogExp2(0x0a1a3a, 0.015);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 60);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Add lighting for 3D environment
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            // Add a directional light so the 3D terrain has visible shadows/contrast
            const dirLight = new THREE.DirectionalLight(0x88bbff, 0.5);
            dirLight.position.set(50, 100, 20);
            scene.add(dirLight);

            // Initialize Environment
            environmentSystem = new WeatherEnvironment(scene);

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            
            animateLoop();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            // Normalize mouse for camera parallax
            state.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            state.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        // --- COMPLETE WEATHER ENVIRONMENT CLASS ---
        class WeatherEnvironment {
            constructor(scene) {
                this.scene = scene;
                this.cloudSprites = [];
                this.precipitationPoints = null;
                
                // Construct the 3D Space
                this.createGround();
                this.createClouds();
                this.createPrecipitation();
                
                this.setMode('Clear', 0);
            }

            // 1. Ground Plane (Dashboard Grid Aesthetic)
            createGround() {
                // Create a large plane with many segments for terrain displacement
                const geometry = new THREE.PlaneGeometry(400, 400, 64, 64);

                // Displace vertices to create a low-poly terrain/hills
                const positions = geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    const x = positions[i];
                    const y = positions[i + 1];
                    // Create rolling hills using sine waves and a tiny bit of random noise
                    const z = Math.sin(x * 0.05) * Math.cos(y * 0.05) * 8 + (Math.random() - 0.5) * 2;
                    positions[i + 2] = z; // Displace the height
                }
                
                geometry.computeVertexNormals(); // Required for lighting/shadows

                const material = new THREE.MeshStandardMaterial({
                    color: 0x0a0f18, // Very dark blue/charcoal terrain
                    roughness: 0.9,
                    metalness: 0.1,
                    flatShading: true // Gives a stylish, modern low-poly look
                });

                const ground = new THREE.Mesh(geometry, material);
                ground.rotation.x = -Math.PI / 2; // Lay it flat on the XZ plane
                ground.position.y = -5; // Move below the camera origin
                
                this.scene.add(ground);
            }

            // 2. Procedural Volumetric Clouds
            createClouds() {
                // Generate a fluffy cloud texture dynamically using Canvas
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                
                // Draw overlapping soft circles to mimic a cloud
                for (let i = 0; i < 40; i++) {
                    const x = 256 + (Math.random() - 0.5) * 250;
                    const y = 256 + (Math.random() - 0.5) * 150;
                    const r = 50 + Math.random() * 100;
                    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI*2);
                    ctx.fill();
                }
                const cloudTexture = new THREE.CanvasTexture(canvas);

                const cloudMaterial = new THREE.SpriteMaterial({
                    map: cloudTexture,
                    transparent: true,
                    opacity: 0.8,
                    depthWrite: false,
                    color: 0xffffff
                });

                // Spawn a layer of 3D Clouds
                for(let i = 0; i < 60; i++) {
                    const sprite = new THREE.Sprite(cloudMaterial.clone());
                    // Spread them out in the sky
                    sprite.position.set(
                        (Math.random() - 0.5) * 200, // X
                        20 + Math.random() * 30,     // Y (Above grid)
                        (Math.random() - 0.5) * 150 - 20 // Z (Depth)
                    );
                    const scale = 20 + Math.random() * 30;
                    sprite.scale.set(scale, scale * 0.6, 1); // Wider than tall
                    
                    this.cloudSprites.push(sprite);
                    this.scene.add(sprite);
                }
            }

            // 3. Precipitation System (Rain/Snow falling to ground)
            createPrecipitation() {
                this.particleCount = 5000;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.particleCount * 3);
                
                for (let i = 0; i < this.particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 150;
                    positions[i * 3 + 1] = Math.random() * 80;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 150;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                // Soft circle for rain streak / snowflake
                const canvas = document.createElement('canvas');
                canvas.width = 16; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, 0, 32);
                gradient.addColorStop(0, 'rgba(255,255,255,0)');
                gradient.addColorStop(0.5, 'rgba(255,255,255,1)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(7, 0, 2, 32);

                this.precipMaterial = new THREE.PointsMaterial({
                    size: 1.5,
                    map: new THREE.CanvasTexture(canvas),
                    transparent: true,
                    opacity: 0.0, // Hidden by default
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                this.precipitationPoints = new THREE.Points(geometry, this.precipMaterial);
                this.scene.add(this.precipitationPoints);
            }

            setMode(weatherMain, windSpeed) {
                // Determine Environment Colors and Display
                let cloudColor = 0xffffff;
                let cloudOpacity = 0.8;
                let rainOpacity = 0.0;
                let rainSpeed = 0;
                let rainColor = 0x00ffff; // Cyan default
                
                if (['Rain', 'Drizzle'].includes(weatherMain)) {
                    state.targetSkyColor.setHex(0x1a202c); // Dark stormy gray
                    state.targetFogDensity = 0.02;
                    cloudColor = 0x4a5568; // Dark gray clouds
                    cloudOpacity = 0.9;
                    rainOpacity = 0.5;
                    rainSpeed = 40;
                    rainColor = 0x00ffff; // Cyan rain
                } else if (weatherMain === 'Thunderstorm') {
                    state.targetSkyColor.setHex(0x050508); // Pitch black
                    state.targetFogDensity = 0.03;
                    cloudColor = 0x111115; // Very dark clouds
                    cloudOpacity = 1.0;
                    rainOpacity = 0.7;
                    rainSpeed = 50;
                    rainColor = 0xb026ff; // Purple rain
                } else if (weatherMain === 'Snow') {
                    state.targetSkyColor.setHex(0x4a5568); // Pale gray
                    state.targetFogDensity = 0.025;
                    cloudColor = 0xffffff;
                    cloudOpacity = 0.9;
                    rainOpacity = 0.6;
                    rainSpeed = 5; // Slow fall
                    rainColor = 0xffffff; // White snow
                } else if (weatherMain === 'Clouds') {
                    state.targetSkyColor.setHex(0x2d3748); // Slate sky
                    state.targetFogDensity = 0.015;
                    cloudColor = 0x8899aa; // Light gray clouds
                    cloudOpacity = 0.85;
                } else if (['Mist', 'Fog', 'Haze'].includes(weatherMain)) {
                    state.targetSkyColor.setHex(0x5c4b37); // Brown/Orange
                    state.targetFogDensity = 0.05; // High fog
                    cloudColor = 0xff6a00;
                    cloudOpacity = 0.3;
                } else {
                    // Clear / Sunny
                    state.targetSkyColor.setHex(0x0a1a3a); // Midnight Blue
                    state.targetFogDensity = 0.01;
                    cloudColor = 0xffffff;
                    cloudOpacity = 0.1; // Barely visible
                }

                // Apply changes to objects
                this.precipMaterial.opacity = rainOpacity;
                this.precipMaterial.color.setHex(rainColor);
                this.currentRainSpeed = rainSpeed;

                this.cloudSprites.forEach(sprite => {
                    sprite.material.color.setHex(cloudColor);
                    sprite.material.opacity = cloudOpacity;
                });
            }

            update(dt, time, windSpeed, weatherMain) {
                // 1. Cloud Drifting
                const windEffect = windSpeed * 0.1;
                this.cloudSprites.forEach(sprite => {
                    sprite.position.x += windEffect * dt * 5;
                    // Wrap clouds around
                    if (sprite.position.x > 100) sprite.position.x = -100;
                    if (sprite.position.x < -100) sprite.position.x = 100;
                });

                // 2. Precipitation Physics
                if (this.precipMaterial.opacity > 0) {
                    const positions = this.precipitationPoints.geometry.attributes.position.array;
                    for (let i = 0; i < this.particleCount; i++) {
                        let ix = i * 3;
                        let iy = i * 3 + 1;
                        
                        // Fall down
                        positions[iy] -= this.currentRainSpeed * dt;
                        
                        // Blow sideways with wind
                        positions[ix] += windEffect * dt * 10;
                        
                        if (weatherMain === 'Snow') {
                            // Wavy snow
                            positions[ix] += Math.sin(time * 2 + i) * 0.05;
                        }

                        // Reset at ground level (y=-5)
                        if (positions[iy] < -5) {
                            positions[iy] = 60 + Math.random() * 20;
                            positions[ix] = (Math.random() - 0.5) * 150;
                        }
                        if (positions[ix] > 75) positions[ix] = -75;
                        if (positions[ix] < -75) positions[ix] = 75;
                    }
                    this.precipitationPoints.geometry.attributes.position.needsUpdate = true;
                }
            }
        }

        function animateLoop() {
            requestAnimationFrame(animateLoop);
            const dt = Math.min(clock.getDelta(), 0.1); 
            const time = clock.getElapsedTime();
            
            // Camera Parallax based on mouse (Look around the 3D environment)
            camera.position.x += (state.mouse.x * 10 - camera.position.x) * 0.05;
            camera.position.y += (-state.mouse.y * 5 + 10 - camera.position.y) * 0.05;
            camera.lookAt(0, 15, 0);

            // Thunderstorm Lightning Logic
            if (state.weatherMain === 'Thunderstorm' && Math.random() < 0.02) {
                // Lightning Flash
                scene.background.setHex(0xaaaaaa);
            } else {
                // Smooth transition of sky colors
                scene.background.lerp(state.targetSkyColor, 0.05);
            }
            
            // Match fog color to sky and lerp density
            scene.fog.color.copy(scene.background);
            scene.fog.density += (state.targetFogDensity - scene.fog.density) * 0.05;

            if (environmentSystem) {
                environmentSystem.update(dt, time, state.windSpeed, state.weatherMain);
            }
            
            renderer.render(scene, camera);
        }

        // ==========================================
        // 3. API INTEGRATION & LOGIC
        // ==========================================

        async function fetchWeather(queryUrl) {
            try {
                DOM.errorMsg.classList.add('hidden');
                const response = await fetch(queryUrl);
                
                if (!response.ok) {
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'City not found or API error');
                    } else {
                        throw new Error(`Vercel Server Error (Status ${response.status}). Check Vercel Logs.`);
                    }
                }
                
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error("AetherWeather Error:", error);
                DOM.errorMsg.classList.remove('hidden');
                DOM.errorMsg.classList.add('flex'); 
                
                let errorMsg = error.message;
                if (window.location.protocol === 'file:') {
                    errorMsg = "Backend blocked: You are viewing a local file. Please open your live Vercel URL.";
                } else if (error.message === 'Failed to fetch' || error.name === 'TypeError') {
                    errorMsg = "Network error. Backend unreachable. Are you on the live Vercel URL?";
                }

                DOM.errorText.textContent = `Data retrieval failed: ${errorMsg}`;
            }
        }

        function searchCity(city) {
            const url = `/api/weather?city=${encodeURIComponent(city)}`;
            fetchWeather(url);
        }

        function getLocalWeather(lat, lon) {
            const url = `/api/weather?lat=${lat}&lon=${lon}`;
            fetchWeather(url);
        }

        function updateDashboard(data) {
            state.weatherMain = data.weather[0].main;
            state.windSpeed = data.wind.speed;

            const iconMap = {
                'Clear': 'ph-sun',
                'Clouds': 'ph-cloud',
                'Rain': 'ph-cloud-rain',
                'Drizzle': 'ph-cloud-rain',
                'Thunderstorm': 'ph-cloud-lightning',
                'Snow': 'ph-snowflake',
                'Mist': 'ph-cloud-fog',
                'Dust': 'ph-wind',
                'Haze': 'ph-cloud-fog'
            };
            const iconClass = iconMap[state.weatherMain] || 'ph-cloud';

            // Apply UI Theme Colors
            let themeClass = 'theme-clear'; 
            if (['Rain', 'Drizzle'].includes(state.weatherMain)) themeClass = 'theme-rain';
            else if (state.weatherMain === 'Thunderstorm') themeClass = 'theme-thunder';
            else if (state.weatherMain === 'Snow') themeClass = 'theme-snow';
            else if (state.weatherMain === 'Clouds') themeClass = 'theme-clouds';
            else if (['Mist', 'Fog', 'Haze', 'Dust', 'Smoke'].includes(state.weatherMain)) themeClass = 'theme-autumn';
            
            document.body.className = themeClass;
            
            DOM.uiCity.textContent = data.name.toUpperCase();
            DOM.uiCountry.textContent = data.sys.country;
            DOM.uiTemp.textContent = Math.round(data.main.temp);
            DOM.uiDesc.textContent = data.weather[0].description;
            DOM.uiWind.textContent = `${data.wind.speed.toFixed(1)} m/s`;
            DOM.uiHumidity.textContent = `${data.main.humidity} %`;
            DOM.uiIcon.innerHTML = `<i class="ph ${iconClass}"></i>`;

            DOM.weatherCard.classList.remove('opacity-0', 'scale-95');
            DOM.weatherCard.classList.add('opacity-100', 'scale-100');

            if(environmentSystem) {
                environmentSystem.setMode(state.weatherMain, state.windSpeed);
            }
        }

        DOM.searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const city = DOM.cityInput.value.trim();
            if (city) searchCity(city);
        });

        function initApp() {
            if (!scene) initThreeJS();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { getLocalWeather(pos.coords.latitude, pos.coords.longitude); },
                    (err) => { searchCity('London'); } 
                );
            } else {
                searchCity('London'); 
            }
        }

        initApp();

    </script>
</body>
</html>
