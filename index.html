<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherWeather Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Space Mono for Terminal Feel -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-color: #050505; /* Midnight Blue / Deep Charcoal */
            --neon-color: #ffd700; /* Default: Gold (Clear/Dust) */
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        /* Theme Overrides applied via JS */
        body.theme-rain { --neon-color: #00ffff; } /* Cyan */
        body.theme-thunder { --neon-color: #b026ff; } /* Purple */
        body.theme-snow { --neon-color: #ffffff; } /* White */
        body.theme-clouds { --neon-color: #b0c4de; } /* Light Steel Blue / Silver */
        body.theme-autumn { --neon-color: #ff6a00; } /* Orange */
        body.theme-clear { --neon-color: #ffcc00; } /* Sunny Yellow */

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Space Mono', monospace;
            color: #ffffff;
            transition: all 1s ease;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Let clicks pass through to background if needed */
        }

        .interactive {
            pointer-events: auto;
        }

        /* Glassmorphism with Neon Accents */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .neon-border {
            border: 1px solid var(--neon-color);
            box-shadow: 0 0 15px rgba(var(--neon-color), 0.2), 
                        inset 0 0 10px rgba(var(--neon-color), 0.1);
        }

        .neon-text {
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-color);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-color); border-radius: 3px; }

        input:focus { outline: none; }
        
        /* Loading Spinner */
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="theme-clear">

    <!-- Three.js Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="p-6 md:p-12 justify-between">
        
        <!-- Top Bar: Search -->
        <div class="w-full max-w-md mx-auto interactive">
            <form id="search-form" class="glass-card neon-border flex items-center p-2 px-4 transition-all hover:bg-white/5">
                <i class="ph ph-magnifying-glass text-xl text-gray-400"></i>
                <input type="text" id="city-input" placeholder="Search any city in the world..." 
                       class="w-full bg-transparent border-none text-white px-3 py-2 placeholder-gray-500 font-mono text-sm">
                <button type="submit" class="text-sm font-bold neon-text hover:opacity-80 transition-opacity">
                    SCAN
                </button>
            </form>
            <div id="error-msg" class="mt-3 text-center hidden flex flex-col items-center">
                <span id="error-text" class="text-red-400 text-xs">City not found.</span>
                <button id="reset-key-btn" type="button" class="mt-2 text-[#ffd700] text-xs underline hover:text-white cursor-pointer hidden">Reset API Key</button>
            </div>
        </div>

        <!-- Main Weather Display -->
        <div class="flex-grow flex items-center justify-center interactive">
            <div id="weather-card" class="glass-card neon-border p-8 md:p-12 w-full max-w-lg transform transition-all duration-700 opacity-0 scale-95">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h1 id="ui-city" class="text-3xl md:text-5xl font-bold tracking-tighter mb-1">CITY</h1>
                        <p id="ui-country" class="text-gray-400 text-sm tracking-widest">COUNTRY</p>
                    </div>
                    <div id="ui-icon" class="text-5xl neon-text">
                        <i class="ph ph-cloud"></i>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="text-6xl md:text-8xl font-bold tracking-tighter flex items-start">
                        <span id="ui-temp">--</span>
                        <span class="text-3xl md:text-4xl text-gray-400 mt-2">°C</span>
                    </div>
                    <p id="ui-desc" class="text-lg uppercase tracking-widest neon-text mt-2">Awaiting Data</p>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div class="flex items-center space-x-3">
                        <i class="ph ph-wind text-2xl text-gray-400"></i>
                        <div>
                            <p class="text-xs text-gray-500 uppercase">Wind</p>
                            <p id="ui-wind" class="font-bold">-- m/s</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <i class="ph ph-drop text-2xl text-gray-400"></i>
                        <div>
                            <p class="text-xs text-gray-500 uppercase">Humidity</p>
                            <p id="ui-humidity" class="font-bold">-- %</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center text-xs text-gray-500 tracking-widest uppercase">
            AetherWeather <span class="mx-2">|</span> Procedural Environmental Dashboard
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        // ==========================================
        // 1. SYSTEM STATE & CONSTANTS
        // ==========================================
        const state = {
            weatherMain: 'Clear', // Default state
            windSpeed: 0,
            mouse: new THREE.Vector2(-1000, -1000) // Start off-screen
        };

        // UI Elements
        const DOM = {
            searchForm: document.getElementById('search-form'),
            cityInput: document.getElementById('city-input'),
            errorMsg: document.getElementById('error-msg'),
            errorText: document.getElementById('error-text'),
            weatherCard: document.getElementById('weather-card'),
            uiCity: document.getElementById('ui-city'),
            uiCountry: document.getElementById('ui-country'),
            uiTemp: document.getElementById('ui-temp'),
            uiDesc: document.getElementById('ui-desc'),
            uiWind: document.getElementById('ui-wind'),
            uiHumidity: document.getElementById('ui-humidity'),
            uiIcon: document.getElementById('ui-icon')
        };

        // ==========================================
        // 2. THREE.JS ENGINE & PROCEDURAL PARTICLES
        // ==========================================
        let scene, camera, renderer, particleSystem;
        let clock = new THREE.Clock();

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.015);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Initialize Particles
            particleSystem = new AetherParticles(scene);

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            
            // Touch support for interaction
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    state.mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                    state.mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
                }
            }, {passive: true});

            animateLoop();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            // Normalize mouse coordinates for Raycasting math (-1 to +1)
            state.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            state.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        // --- PARTICLE SYSTEM CLASS ---
        class AetherParticles {
            constructor(scene) {
                this.scene = scene;
                this.particleCount = 5000; // Optimal for web performance
                this.mode = 'Clear'; // 'Rain', 'Snow', 'Clear', 'Clouds', 'Autumn'
                this.windInfluence = 0;
                
                this.geometry = new THREE.BufferGeometry();
                this.positions = new Float32Array(this.particleCount * 3);
                this.baseVelocities = new Float32Array(this.particleCount * 3);
                this.phases = new Float32Array(this.particleCount); // For snow sine wave
                
                const spread = 120;
                for (let i = 0; i < this.particleCount; i++) {
                    // X, Y, Z
                    this.positions[i * 3] = (Math.random() - 0.5) * spread;
                    this.positions[i * 3 + 1] = (Math.random() - 0.5) * spread;
                    this.positions[i * 3 + 2] = (Math.random() - 0.5) * spread * 0.5; // Less depth
                    
                    // Velocity X, Y, Z
                    this.baseVelocities[i * 3] = 0;
                    this.baseVelocities[i * 3 + 1] = 0;
                    this.baseVelocities[i * 3 + 2] = 0;
                    
                    // Phase
                    this.phases[i] = Math.random() * Math.PI * 2;
                }

                this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                this.geometry.setAttribute('velocity', new THREE.BufferAttribute(this.baseVelocities, 3));
                this.geometry.setAttribute('phase', new THREE.BufferAttribute(this.phases, 1));

                // Generate procedural textures via Canvas
                this.textures = {
                    rain: this.createRainTexture(),
                    snow: this.createSnowTexture(),
                    clear: this.createDustTexture()
                };

                this.material = new THREE.PointsMaterial({
                    size: 0.8,
                    map: this.textures.clear,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    color: 0xffd700
                });

                this.points = new THREE.Points(this.geometry, this.material);
                this.scene.add(this.points);
                
                this.setMode('Clear', 0);
            }

            // Texture Generators
            createRainTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 16; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, 0, 64);
                gradient.addColorStop(0, 'rgba(255,255,255,0)');
                gradient.addColorStop(0.5, 'rgba(255,255,255,1)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(7, 0, 2, 64);
                return new THREE.CanvasTexture(canvas);
            }

            createSnowTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(16, 16, 16, 0, Math.PI * 2);
                ctx.fill();
                return new THREE.CanvasTexture(canvas);
            }

            createDustTexture() {
                return this.createSnowTexture(); // Reuse snow soft circle for dust
            }

            setMode(weatherMain, windSpeed) {
                this.windInfluence = windSpeed;
                
                // Group weather states properly
                if (['Rain', 'Drizzle'].includes(weatherMain)) {
                    this.mode = 'Rain';
                    this.material.map = this.textures.rain;
                    this.material.color.setHex(0x00ffff); // Cyan
                    this.material.size = 2.0;
                    this.material.opacity = 0.6;
                } else if (weatherMain === 'Thunderstorm') {
                    this.mode = 'Rain'; // Uses rain physics
                    this.material.map = this.textures.rain;
                    this.material.color.setHex(0xb026ff); // Electric Purple
                    this.material.size = 3.0; // Heavier rain
                    this.material.opacity = 0.8;
                } else if (weatherMain === 'Snow') {
                    this.mode = 'Snow';
                    this.material.map = this.textures.snow;
                    this.material.color.setHex(0xffffff); // White
                    this.material.size = 1.5;
                    this.material.opacity = 0.8;
                } else if (weatherMain === 'Clouds') {
                    this.mode = 'Clouds';
                    this.material.map = this.textures.clear;
                    this.material.color.setHex(0xb0c4de); // Light Steel Blue / Silver
                    this.material.size = 1.0;
                    this.material.opacity = 0.5;
                } else if (['Mist', 'Fog', 'Haze', 'Dust', 'Smoke', 'Sand', 'Ash'].includes(weatherMain)) {
                    this.mode = 'Autumn'; // Swirling dust/particles
                    this.material.map = this.textures.snow; 
                    this.material.color.setHex(0xff6a00); // Orange
                    this.material.size = 1.2;
                    this.material.opacity = 0.5;
                } else {
                    this.mode = 'Clear'; // Sunny
                    this.material.map = this.textures.clear;
                    this.material.color.setHex(0xffcc00); // Sunny Yellow
                    this.material.size = 0.8;
                    this.material.opacity = 0.4;
                }

                // Reset base velocities based on mode
                const velocities = this.geometry.attributes.velocity.array;
                for (let i = 0; i < this.particleCount; i++) {
                    if (this.mode === 'Rain') {
                        velocities[i * 3 + 1] = - (Math.random() * 20 + 30); // Fast Y drop
                    } else if (this.mode === 'Snow') {
                        velocities[i * 3 + 1] = - (Math.random() * 3 + 2); // Slow Y drop
                    } else if (this.mode === 'Autumn') {
                        velocities[i * 3 + 1] = - (Math.random() * 5 + 1); // Moderate diagonal drop
                    } else if (this.mode === 'Clouds') {
                        velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.2; // Float very slowly
                    } else {
                        velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.5; // Float slightly faster for sunny
                    }
                }
                this.geometry.attributes.velocity.needsUpdate = true;
                this.material.needsUpdate = true;
            }

            update(dt, time, mouseState) {
                const positions = this.geometry.attributes.position.array;
                const velocities = this.geometry.attributes.velocity.array;
                const phases = this.geometry.attributes.phase.array;

                // Calculate mouse world position at z=0 plane for interaction
                let mouseWorld = new THREE.Vector3();
                if (mouseState.x !== -1000) {
                    let vector = new THREE.Vector3(mouseState.x, mouseState.y, 0.5);
                    vector.unproject(camera);
                    let dir = vector.sub(camera.position).normalize();
                    let distance = -camera.position.z / dir.z;
                    mouseWorld = camera.position.clone().add(dir.multiplyScalar(distance));
                }

                // Interaction parameters
                const repelRadiusSq = 150; // Radius of mouse influence squared
                const repelForce = 0.5;
                const windEffect = this.windInfluence * 0.05; // Base wind vector

                for (let i = 0; i < this.particleCount; i++) {
                    let ix = i * 3;
                    let iy = i * 3 + 1;
                    
                    // 1. Apply Base Velocity (Gravity / Drift)
                    positions[iy] += velocities[iy] * dt;

                    // 2. Apply Wind and Mode-Specific X logic
                    if (this.mode === 'Rain') {
                        positions[ix] += windEffect + (Math.random() - 0.5) * 0.1; 
                    } else if (this.mode === 'Snow') {
                        // Horizontal oscillation + wind
                        positions[ix] += Math.sin(time * 2 + phases[i]) * 0.05 + windEffect * 0.5;
                    } else if (this.mode === 'Autumn') {
                        // Swirling sideways motion
                        positions[ix] += Math.sin(time * 3 + phases[i]) * 0.1 + windEffect * 1.5;
                    } else if (this.mode === 'Clouds') {
                        // Very slow, gentle drift
                        positions[ix] += (Math.random() - 0.5) * 0.03 + windEffect * 0.3;
                    } else {
                        // Floating dust drifts slowly with wind
                        positions[ix] += (Math.random() - 0.5) * 0.05 + windEffect * 0.2;
                    }

                    // 3. Mouse Interaction (Flee mechanic)
                    if (mouseState.x !== -1000) {
                        let dx = positions[ix] - mouseWorld.x;
                        let dy = positions[iy] - mouseWorld.y;
                        let distSq = dx * dx + dy * dy;

                        if (distSq < repelRadiusSq && distSq > 0.1) {
                            let force = (repelRadiusSq - distSq) / repelRadiusSq;
                            positions[ix] += (dx / Math.sqrt(distSq)) * force * repelForce;
                            positions[iy] += (dy / Math.sqrt(distSq)) * force * repelForce;
                        }
                    }

                    // 4. Boundary Wrapping
                    if (positions[iy] < -60) positions[iy] = 60;
                    if (positions[iy] > 60) positions[iy] = -60;
                    if (positions[ix] < -80) positions[ix] = 80;
                    if (positions[ix] > 80) positions[ix] = -80;
                }

                this.geometry.attributes.position.needsUpdate = true;
            }
        }

        function animateLoop() {
            requestAnimationFrame(animateLoop);
            const dt = Math.min(clock.getDelta(), 0.1); // Cap delta time
            const elapsedTime = clock.getElapsedTime();
            
            if (particleSystem) {
                particleSystem.update(dt, elapsedTime, state);
            }
            
            renderer.render(scene, camera);
        }

        // ==========================================
        // 3. API INTEGRATION & LOGIC
        // ==========================================

        async function fetchWeather(queryUrl) {
            try {
                DOM.errorMsg.classList.add('hidden');
                const response = await fetch(queryUrl);
                
                if (!response.ok) {
                    // Check if the response is actually JSON before parsing
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'City not found or API error');
                    } else {
                        throw new Error(`Vercel Server Error (Status ${response.status}). Check Vercel Logs.`);
                    }
                }
                
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error("AetherWeather Error:", error);
                DOM.errorMsg.classList.remove('hidden');
                DOM.errorMsg.classList.add('flex'); // Use flex for proper button alignment
                
                let errorMsg = error.message;
                
                // Smart Error Detection: Check if the user is running the file locally
                if (window.location.protocol === 'file:') {
                    errorMsg = "Backend blocked: You are viewing a local file. Please open your live Vercel URL to use the backend API.";
                } else if (error.message === 'Failed to fetch' || error.name === 'TypeError') {
                    errorMsg = "Network error. Backend unreachable. Are you on the live Vercel URL?";
                }

                DOM.errorText.textContent = `Data retrieval failed: ${errorMsg}`;
            }
        }

        function searchCity(city) {
            // Point to Vercel Serverless Function instead of OpenWeatherMap
            const url = `/api/weather?city=${encodeURIComponent(city)}`;
            fetchWeather(url);
        }

        function getLocalWeather(lat, lon) {
            // Point to Vercel Serverless Function instead of OpenWeatherMap
            const url = `/api/weather?lat=${lat}&lon=${lon}`;
            fetchWeather(url);
        }

        function updateDashboard(data) {
            // Update State
            state.weatherMain = data.weather[0].main;
            state.windSpeed = data.wind.speed;

            // Map Icons
            const iconMap = {
                'Clear': 'ph-sun',
                'Clouds': 'ph-cloud',
                'Rain': 'ph-cloud-rain',
                'Drizzle': 'ph-cloud-rain',
                'Thunderstorm': 'ph-cloud-lightning',
                'Snow': 'ph-snowflake',
                'Mist': 'ph-cloud-fog',
                'Dust': 'ph-wind',
                'Haze': 'ph-cloud-fog'
            };
            const iconClass = iconMap[state.weatherMain] || 'ph-cloud';

            // Apply Theme
            let themeClass = 'theme-clear'; // Default to Sunny
            
            if (['Rain', 'Drizzle'].includes(state.weatherMain)) {
                themeClass = 'theme-rain';
            } else if (state.weatherMain === 'Thunderstorm') {
                themeClass = 'theme-thunder';
            } else if (state.weatherMain === 'Snow') {
                themeClass = 'theme-snow';
            } else if (state.weatherMain === 'Clouds') {
                themeClass = 'theme-clouds';
            } else if (['Mist', 'Fog', 'Haze', 'Dust', 'Smoke', 'Sand', 'Ash'].includes(state.weatherMain)) {
                themeClass = 'theme-autumn';
            }
            
            document.body.className = themeClass;
            
            // Update UI Elements
            DOM.uiCity.textContent = data.name.toUpperCase();
            DOM.uiCountry.textContent = data.sys.country;
            DOM.uiTemp.textContent = Math.round(data.main.temp);
            DOM.uiDesc.textContent = data.weather[0].description;
            DOM.uiWind.textContent = `${data.wind.speed.toFixed(1)} m/s`;
            DOM.uiHumidity.textContent = `${data.main.humidity} %`;
            DOM.uiIcon.innerHTML = `<i class="ph ${iconClass}"></i>`;

            // Reveal Card (if first load)
            DOM.weatherCard.classList.remove('opacity-0', 'scale-95');
            DOM.weatherCard.classList.add('opacity-100', 'scale-100');

            // Update Three.js
            if(particleSystem) {
                particleSystem.setMode(state.weatherMain, state.windSpeed);
            }
        }

        DOM.searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const city = DOM.cityInput.value.trim();
            if (city) searchCity(city);
        });

        // Initialize Application
        function initApp() {
            // Initialize 3D Engine
            if (!scene) initThreeJS();

            // Try Geolocation first, fallback to London
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { getLocalWeather(pos.coords.latitude, pos.coords.longitude); },
                    (err) => { searchCity('London'); } // Fallback
                );
            } else {
                searchCity('London'); // Fallback
            }
        }

        // Start Boot Sequence
        initApp();

    </script>
</body>
</html>
